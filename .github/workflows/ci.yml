name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Python code with ruff
        run: |
          pip install ruff
          ruff check .
        continue-on-error: true

      - name: Validate notebook is parseable
        run: |
          python -c "import json; json.load(open('analysis.ipynb'))"
          echo "Notebook is valid JSON."

      - name: Check for large files (> 1 MB)
        run: |
          find . -type f -size +1M ! -path './.git/*' -exec echo "WARNING: Large file detected: {}" \;
        continue-on-error: true
